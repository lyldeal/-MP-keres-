<!DOCTYPE html>

<head>

  <style>

      margin-bottom: 30px;
    }

      width: 520px;

      border-radius: 30px;
      border: 1px solid #ccc;
      outline: none;

    }

    .name {

      font-weight: bold;
      color: #1a0dab;
    }

    .tags {

      margin-top: 4px;
    }

    .desc {

      margin-top: 6px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<input type="text" id="search" placeholder="Keress névre, témára, kulcsszóra..." onkeyup="searchPeople()">

  {

  },
  {
    name: "Halász Emese",
    tags: "lovaglás ló betörése arab telivér nonius vadászat agyaggalamb lövészet fegyver sörétes puska kézifegyver zsigerelés nyúzás balett jazzbalett klasszikus tánc bachata kubai salsa komolyzene plébánia önkéntesség menekültek politika konzulátus energiagyógyászat ezotéria szellemvilág entitás démon szelleműzés paranormális trauma gyermekbántalmazás abúzus rendőrség drog leszokás előadás prezentáció előadástechnika kommunikáció",
    desc: "Rendkívül sokrétű tapasztalat: lovaglás, vadászat, fegyverismeret, állatfeldolgozás, tánc és zene. Szociális, rendészeti és politikai háttértapasztalatokkal is rendelkezik. Jártas spirituális és ezoterikus témákban, traumák, rendőrségi helyzetek és drogprevenció terén. Aktív előadó és prezentációs tréner."
  }
];

function searchPeople() {
  const input = document.getElementById("search").value.toLowerCase();
  const results = document.getElementById("results");

  results.innerHTML = "";

  people.forEach(person => {
    const searchableText = (
      person.name + " " +
      person.tags + " " +
      person.desc
    ).toLowerCase();

    if (searchableText.includes(input)) {
      results.innerHTML += `
        <div class="card" onclick="alert('${person.desc.replace(/'/g, "\\'")}')">
          <div class="name">${person.name}</div>
          <div class="tags">${person.tags}</div>
          <div class="desc">${person.desc}</div>
        </div>
      `;
    }
  });
}

searchPeople();
</script>

</body>
</html>
