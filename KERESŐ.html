<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Kereső</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
}

input {
    padding: 10px;
    width: 300px;
    font-size: 16px;
}

.result {
    margin-top: 10px;
    padding: 10px;
    border: 1px solid #ccc;
}
</style>

</head>
<body>

<h2>Kereső</h2>

<input type="text" id="search" placeholder="Keresés..." onkeyup="keres()">

<div id="results"></div>

<script>
let adatok = [];

fetch("adatok.csv")
.then(response => response.text())
.then(text => {
    let sorok = text.split("\n");
    for (let sor of sorok) {
        let oszlopok = sor.split(";");
        adatok.push(oszlopok);
    }
});

function keres() {
    let input = document.getElementById("search").value.toLowerCase();
    let results = document.getElementById("results");
    results.innerHTML = "";

    for (let sor of adatok) {
        let talalat = sor.join(" ").toLowerCase();
        if (talalat.includes(input)) {
            let div = document.createElement("div");
            div.className = "result";
            div.innerText = sor.join(" | ");
            results.appendChild(div);
        }
    }
}
</script>

</body>
</html>
