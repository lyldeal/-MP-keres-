<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Kereső</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  text-align: center;
  padding: 60px;
}

input {
  padding: 12px;
  width: 400px;
  border-radius: 20px;
  border: 1px solid #ccc;
  font-size: 18px;
}

.name {
  color: blue;
  font-size: 22px;
  cursor: pointer;
  margin: 10px 0;
}

.card {
  background: white;
  padding: 20px;
  margin: 20px auto;
  max-width: 600px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

button {
  margin: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Kereső</h1>
<input onkeyup="keres()" id="input" placeholder="Írj be kulcsszót">

<div id="lista"></div>
<div id="profil"></div>

<script>
let adatok = [];

fetch("adatok.csv")
.then(res => res.text())
.then(text => {
  const sorok = text.split("\n").slice(1);

  adatok = sorok.map(sor => {
    let elemek = sor.split(";");
    return {
      nev: elemek[0],
      kulcsszo: elemek[1],
      temak: elemek[2],
      leiras: elemek[3]
    };
  });
});

function keres() {
  let q = document.getElementById("input").value.toLowerCase();
  let lista = document.getElementById("lista");
  let profil = document.getElementById("profil");

  lista.innerHTML = "";
  profil.innerHTML = "";

  adatok.forEach(p => {
    let full = (p.nev + p.kulcsszo + p.temak + p.leiras).toLowerCase();

    if (full.includes(q) && q !== "") {
      lista.innerHTML += `<div class="name" onclick="mutat(${JSON.stringify(p)})">${p.nev}</div>`;
    }
  });
}

function mutat(p) {
  document.getElementById("profil").innerHTML = `
    <div class="card">
      <h2>${p.nev}</h2>

     <button onclick="temak(\`${p.temak}\`)">Könyves témák</button>
<button onclick="leiras(\`${p.leiras}\`)">Leírás</button>

      <div id="tartalom"></div>
    </div>
  `;
}

function temak(t) {
  let lista = t.split(",").map(x => `<li>${x}</li>`).join("");
  document.getElementById("tartalom").innerHTML = `<ul>${lista}</ul>`;
}

function leiras(l) {
  document.getElementById("tartalom").innerHTML = `<p>${l}</p>`;
}
</script>

</body>
</html>
